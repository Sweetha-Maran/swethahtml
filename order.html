<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Now - Burger</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-image: url(./images/2.jpg);
      background-size: cover;
      background-position: center;
      min-height: 80vh;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .order-form-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      top: 20px;position: relative;
      border-radius: 16px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      height: 550px;
      color: #2d2d2d;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
      font-size: 2rem;
      color: #e67e22;
      margin-bottom: 25px;
    }

    form {
      display: flex;
      flex-direction: column;
   gap: 5px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      height: 80px;
    }

    label {
      font-weight: 600;
      margin-bottom: 5px;
    }

    input, select, textarea {
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.85);
      color: #333;
      outline: none;
    }

   
    button {
      background-color: #e67e22;
      color: white;
      padding: 12px;
      font-size: 1rem;
      justify-content: center;
      width: 30%;
      border: none;align-items: center;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 35%;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #cf6b1f;
    }

    @media (max-width: 430px) {
      .order-form-container {
        padding: 20px;
      }

      h2 {
        font-size: 1.6rem;
      }

      input, select, textarea, button {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <div class="order-form-container">
    <h2>Order Your Burger</h2>

    <form action="#" method="POST">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
      </div>

      

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
      </div>

      <div class="form-group">
        <label for="address">Delivery Address</label>
        <textarea id="address" name="address" rows="3" placeholder="Your address..." required></textarea>
      </div>

      <div class="form-group">
        <label for="burger">Select Burger</label>
        <select id="burger" name="burger" required>
          <option value="" disabled selected>Select a burger</option>
          <option>Classic Chicken - ₹149</option>
          <option>Spicy Chicken - ₹159</option>
          <option>BBQ Chicken - ₹169</option>
          <option>Cheesy Chicken - ₹179</option>
          <option>Tandoori Chicken - ₹189</option>
          <option>Classic Veg - ₹99</option>
          <option>Paneer Delight - ₹129</option>
          <option>Cheesy Veggie - ₹119</option>
          <option>Spicy Aloo Tikki - ₹109</option>
          <option>Healthy Veg - ₹89</option>
        </select>
      </div>

      <div class="form-group">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" min="1" value="1" required>
      </div>

      <div class="form-group">
        <button type="submit">Order Now</button>
      </div>
    </form>
  </div>

</body>
</html>
